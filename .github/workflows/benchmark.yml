name: Latchkey Runner Benchmark

on:
  workflow_dispatch:
    inputs:
      runner_label:
        description: 'Runner label to benchmark'
        required: false
        default: 'latchkey-medium'
        type: choice
        options:
          - latchkey-small
          - latchkey-medium
          - latchkey-large
          - latchkey-xlarge
  workflow_call:
    inputs:
      runner_label:
        description: 'Runner label to benchmark'
        required: false
        default: 'latchkey-medium'
        type: string

permissions:
  actions: read

jobs:
  # =========================================================================
  # Job 0: Runner Diagnostics
  # =========================================================================
  diagnostics:
    name: Runner Diagnostics
    runs-on: [self-hosted, "${{ inputs.runner_label || 'latchkey-medium' }}"]
    steps:
      - name: Environment variables
        run: |
          echo "### Runner Diagnostics" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "#### Environment" >> "$GITHUB_STEP_SUMMARY"
          echo "| Variable | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|----------|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| ACTIONS_CACHE_URL | ${ACTIONS_CACHE_URL:-NOT SET} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| ECR_CACHE_REPO | ${ECR_CACHE_REPO:-NOT SET} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| RUNNER_NAME | ${RUNNER_NAME:-unknown} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| RUNNER_OS | ${RUNNER_OS:-unknown} |" >> "$GITHUB_STEP_SUMMARY"

      - name: Instance metadata
        run: |
          TOKEN=$(curl -s -X PUT "http://169.254.169.254/latest/api/token" -H "X-aws-ec2-metadata-token-ttl-seconds: 21600")
          INSTANCE_ID=$(curl -s -H "X-aws-ec2-metadata-token: $TOKEN" http://169.254.169.254/latest/meta-data/instance-id)
          INSTANCE_TYPE=$(curl -s -H "X-aws-ec2-metadata-token: $TOKEN" http://169.254.169.254/latest/meta-data/instance-type)
          AZ=$(curl -s -H "X-aws-ec2-metadata-token: $TOKEN" http://169.254.169.254/latest/meta-data/placement/availability-zone)

          echo "#### Instance" >> "$GITHUB_STEP_SUMMARY"
          echo "| Info | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|------|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Instance ID | $INSTANCE_ID |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Instance type | $INSTANCE_TYPE |" >> "$GITHUB_STEP_SUMMARY"
          echo "| AZ | $AZ |" >> "$GITHUB_STEP_SUMMARY"

      - name: Cache proxy diagnostics
        run: |
          echo "#### Cache Proxy" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"

          echo "--- Binary ---"  >> "$GITHUB_STEP_SUMMARY"
          ls -la /opt/cache-proxy/ >> "$GITHUB_STEP_SUMMARY" 2>&1 || echo "Directory not found" >> "$GITHUB_STEP_SUMMARY"

          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "--- Env file ---" >> "$GITHUB_STEP_SUMMARY"
          cat /opt/cache-proxy/env >> "$GITHUB_STEP_SUMMARY" 2>&1 || echo "Env file not found" >> "$GITHUB_STEP_SUMMARY"

          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "--- Systemd status ---" >> "$GITHUB_STEP_SUMMARY"
          systemctl status cache-proxy --no-pager >> "$GITHUB_STEP_SUMMARY" 2>&1 || echo "Service not running" >> "$GITHUB_STEP_SUMMARY"

          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "--- Journal logs (last 30 lines) ---" >> "$GITHUB_STEP_SUMMARY"
          sudo journalctl -u cache-proxy --no-pager -n 30 >> "$GITHUB_STEP_SUMMARY" 2>&1 || echo "No journal entries" >> "$GITHUB_STEP_SUMMARY"

          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "--- Healthz check ---" >> "$GITHUB_STEP_SUMMARY"
          curl -s http://localhost:8080/healthz >> "$GITHUB_STEP_SUMMARY" 2>&1 || echo "Healthz failed" >> "$GITHUB_STEP_SUMMARY"

          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "--- Runner .env ---" >> "$GITHUB_STEP_SUMMARY"
          cat /opt/actions-runner/.env >> "$GITHUB_STEP_SUMMARY" 2>&1 || echo ".env not found" >> "$GITHUB_STEP_SUMMARY"

          echo '```' >> "$GITHUB_STEP_SUMMARY"

      - name: Installed tools
        run: |
          echo "#### Tools" >> "$GITHUB_STEP_SUMMARY"
          echo "| Tool | Version |" >> "$GITHUB_STEP_SUMMARY"
          echo "|------|---------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Docker | $(docker --version 2>&1) |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Node | $(node --version 2>&1) |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Python | $(python3 --version 2>&1) |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Go | $(go version 2>&1 | cut -d' ' -f3) |" >> "$GITHUB_STEP_SUMMARY"
          echo "| AWS CLI | $(aws --version 2>&1) |" >> "$GITHUB_STEP_SUMMARY"
          echo "| ECR helper | $(test -f /usr/local/bin/docker-credential-ecr-login && echo 'installed' || echo 'missing') |" >> "$GITHUB_STEP_SUMMARY"

  # =========================================================================
  # Job 1: Startup Latency
  # =========================================================================
  startup-latency:
    name: Startup Latency
    runs-on: [self-hosted, "${{ inputs.runner_label || 'latchkey-medium' }}"]
    steps:
      - name: Measure startup latency
        id: latency
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          # Get this job's queued and started timestamps from the API
          JOB_DATA=$(curl -s \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/actions/runs/${{ github.run_id }}/jobs" \
            | jq '.jobs[] | select(.name | endswith("Startup Latency")) | {created_at: .created_at, started_at: .started_at}')

          CREATED_AT=$(echo "$JOB_DATA" | jq -r '.created_at')
          STARTED_AT=$(echo "$JOB_DATA" | jq -r '.started_at')

          # Convert to epoch seconds
          CREATED_EPOCH=$(date -d "$CREATED_AT" +%s)
          STARTED_EPOCH=$(date -d "$STARTED_AT" +%s)
          LATENCY=$((STARTED_EPOCH - CREATED_EPOCH))

          echo "Queued at:  $CREATED_AT"
          echo "Started at: $STARTED_AT"
          echo "Startup latency: ${LATENCY}s"

          echo "latency=${LATENCY}" >> "$GITHUB_OUTPUT"
          echo "created_at=${CREATED_AT}" >> "$GITHUB_OUTPUT"
          echo "started_at=${STARTED_AT}" >> "$GITHUB_OUTPUT"

      - name: Evaluate result
        run: |
          LATENCY=${{ steps.latency.outputs.latency }}
          echo "### Startup Latency: ${LATENCY}s" >> "$GITHUB_STEP_SUMMARY"

          if [ "$LATENCY" -le 10 ]; then
            echo "Result: PASS (warm pool target: <10s)" >> "$GITHUB_STEP_SUMMARY"
          elif [ "$LATENCY" -le 90 ]; then
            echo "Result: PASS (cold start target: <90s)" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "Result: FAIL (target: <90s cold, <10s warm)" >> "$GITHUB_STEP_SUMMARY"
          fi

  # =========================================================================
  # Job 2: S3 Cache Throughput
  # =========================================================================
  cache-throughput:
    name: Cache Throughput
    runs-on: [self-hosted, "${{ inputs.runner_label || 'latchkey-medium' }}"]
    steps:
      - name: Generate 500MB test data
        id: generate
        run: |
          mkdir -p test-cache
          dd if=/dev/urandom of=test-cache/payload.bin bs=1M count=500 status=progress
          ls -lh test-cache/payload.bin
          CHECKSUM=$(sha256sum test-cache/payload.bin | cut -d' ' -f1)
          echo "checksum=${CHECKSUM}" >> "$GITHUB_OUTPUT"
          echo "Generated 500MB payload, SHA256: ${CHECKSUM}"

      - name: Report cache backend
        run: |
          if [ -n "${ACTIONS_CACHE_URL:-}" ]; then
            echo "Cache URL: ${ACTIONS_CACHE_URL} (Latchkey S3 cache proxy)"
          else
            echo "Cache URL: GitHub default"
          fi

      - name: Start save timer
        id: save-start
        run: echo "ns=$(date +%s%N)" >> "$GITHUB_OUTPUT"

      - name: Save cache
        uses: actions/cache/save@v4
        id: save
        with:
          path: test-cache
          key: benchmark-${{ github.run_id }}-${{ github.run_attempt }}

      - name: Stop save timer
        id: save-end
        run: echo "ns=$(date +%s%N)" >> "$GITHUB_OUTPUT"

      - name: Clear local data
        run: |
          rm -rf test-cache
          echo "Local cache data cleared"

      - name: Start restore timer
        id: restore-start
        run: echo "ns=$(date +%s%N)" >> "$GITHUB_OUTPUT"

      - name: Restore cache
        uses: actions/cache/restore@v4
        id: restore
        with:
          path: test-cache
          key: benchmark-${{ github.run_id }}-${{ github.run_attempt }}

      - name: Stop restore timer
        id: restore-end
        run: echo "ns=$(date +%s%N)" >> "$GITHUB_OUTPUT"

      - name: Verify and summarize
        run: |
          set -euo pipefail

          # Verify data integrity
          if [ ! -f test-cache/payload.bin ]; then
            echo "### S3 Cache Throughput" >> "$GITHUB_STEP_SUMMARY"
            echo "Result: FAIL (cache restore produced no file)" >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi

          SIZE_BYTES=$(stat -c%s test-cache/payload.bin)
          SIZE_MB=$((SIZE_BYTES / 1024 / 1024))
          RESTORED_CHECKSUM=$(sha256sum test-cache/payload.bin | cut -d' ' -f1)
          ORIGINAL_CHECKSUM="${{ steps.generate.outputs.checksum }}"

          if [ "$RESTORED_CHECKSUM" = "$ORIGINAL_CHECKSUM" ]; then
            INTEGRITY="PASS"
          else
            INTEGRITY="FAIL (checksum mismatch)"
          fi

          # Wall-clock timing with millisecond precision (nanosecond timestamps)
          SAVE_NS=$(( ${{ steps.save-end.outputs.ns }} - ${{ steps.save-start.outputs.ns }} ))
          RESTORE_NS=$(( ${{ steps.restore-end.outputs.ns }} - ${{ steps.restore-start.outputs.ns }} ))
          SAVE_MS=$((SAVE_NS / 1000000))
          RESTORE_MS=$((RESTORE_NS / 1000000))

          # Compute throughput (MiB/s) using millisecond precision
          if [ "$SAVE_MS" -gt 0 ]; then
            SAVE_THROUGHPUT=$(( (SIZE_MB * 1000) / SAVE_MS ))
          else
            SAVE_THROUGHPUT=$SIZE_MB
          fi

          if [ "$RESTORE_MS" -gt 0 ]; then
            RESTORE_THROUGHPUT=$(( (SIZE_MB * 1000) / RESTORE_MS ))
          else
            RESTORE_THROUGHPUT=$SIZE_MB
          fi

          # Format durations for display
          SAVE_DISPLAY=$(echo "scale=2; $SAVE_MS / 1000" | bc)
          RESTORE_DISPLAY=$(echo "scale=2; $RESTORE_MS / 1000" | bc)

          echo "Save: ${SIZE_MB}MB in ${SAVE_DISPLAY}s (${SAVE_THROUGHPUT} MiB/s)"
          echo "Restore: ${SIZE_MB}MB in ${RESTORE_DISPLAY}s (${RESTORE_THROUGHPUT} MiB/s)"

          # Build summary
          echo "### S3 Cache Throughput" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Metric | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|--------|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Payload size | ${SIZE_MB} MB |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Data integrity | ${INTEGRITY} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Save duration | ${SAVE_DISPLAY}s |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Save throughput | ${SAVE_THROUGHPUT} MiB/s |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Restore duration | ${RESTORE_DISPLAY}s |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Restore throughput | ${RESTORE_THROUGHPUT} MiB/s |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Cache backend | ${ACTIONS_CACHE_URL:-GitHub default} |" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"

          RESULT="PASS"
          if [ "$SAVE_THROUGHPUT" -lt 500 ]; then
            echo "- Save: BELOW TARGET (target: >500 MiB/s, got: ${SAVE_THROUGHPUT} MiB/s)" >> "$GITHUB_STEP_SUMMARY"
            RESULT="BELOW TARGET"
          else
            echo "- Save: PASS (target: >500 MiB/s)" >> "$GITHUB_STEP_SUMMARY"
          fi

          if [ "$RESTORE_THROUGHPUT" -lt 500 ]; then
            echo "- Restore: BELOW TARGET (target: >500 MiB/s, got: ${RESTORE_THROUGHPUT} MiB/s)" >> "$GITHUB_STEP_SUMMARY"
            RESULT="BELOW TARGET"
          else
            echo "- Restore: PASS (target: >500 MiB/s)" >> "$GITHUB_STEP_SUMMARY"
          fi

          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**Result: ${RESULT}**" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "_Durations from wall-clock timing (millisecond precision)._" >> "$GITHUB_STEP_SUMMARY"

  # =========================================================================
  # Job 3: Docker Layer Cache
  # =========================================================================
  docker-cache:
    name: Docker Layer Cache
    runs-on: [self-hosted, "${{ inputs.runner_label || 'latchkey-medium' }}"]
    steps:
      - name: Checkout benchmark files
        uses: actions/checkout@v4
        with:
          repository: latchkey-dev/runner-benchmarks
          ref: main

      - name: Build uncached (first build populates ECR cache)
        id: build-uncached
        run: |
          START=$(date +%s)

          docker buildx build \
            --file benchmarks/Dockerfile \
            --tag benchmark-test:uncached \
            --no-cache \
            --load \
            .

          END=$(date +%s)
          DURATION=$((END - START))
          echo "Uncached build: ${DURATION}s"
          echo "duration=${DURATION}" >> "$GITHUB_OUTPUT"

      - name: Check ECR cache availability
        id: ecr-check
        run: |
          if [ -n "${ECR_CACHE_REPO:-}" ]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
            echo "ECR_CACHE_REPO is set: ${ECR_CACHE_REPO}"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "ECR_CACHE_REPO is not set — push step will be skipped"
          fi

      - name: Push layers to ECR cache
        if: steps.ecr-check.outputs.available == 'true'
        uses: latchkey-dev/docker-cache-action@v1
        with:
          context: .
          dockerfile: benchmarks/Dockerfile
          tags: benchmark-test:cache-push
          cache-mode: max

      - name: Clear local Docker cache
        run: |
          docker builder prune -af
          docker image rm benchmark-test:uncached 2>/dev/null || true
          docker image rm benchmark-test:cache-push 2>/dev/null || true
          echo "Local Docker cache cleared"

      - name: Build cached (second build uses ECR cache)
        id: build-cached
        run: |
          if [ -n "${ECR_CACHE_REPO:-}" ]; then
            CACHE_REF="${ECR_CACHE_REPO}:cache"
            echo "Using ECR cache: ${CACHE_REF}"

            START=$(date +%s)

            docker buildx build \
              --file benchmarks/Dockerfile \
              --tag benchmark-test:cached \
              --cache-from "type=registry,ref=${CACHE_REF}" \
              --load \
              .

            END=$(date +%s)
            DURATION=$((END - START))
            echo "Cached build: ${DURATION}s"
            echo "duration=${DURATION}" >> "$GITHUB_OUTPUT"
            echo "cache_used=true" >> "$GITHUB_OUTPUT"
          else
            echo "ECR_CACHE_REPO not set — skipping cached build"
            echo "duration=0" >> "$GITHUB_OUTPUT"
            echo "cache_used=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Docker cache summary
        run: |
          UNCACHED=${{ steps.build-uncached.outputs.duration }}
          CACHED=${{ steps.build-cached.outputs.duration }}
          CACHE_USED=${{ steps.build-cached.outputs.cache_used }}

          echo "### Docker Layer Cache" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Metric | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|--------|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Uncached build | ${UNCACHED}s |" >> "$GITHUB_STEP_SUMMARY"

          if [ "$CACHE_USED" = "true" ] && [ "$CACHED" -gt 0 ]; then
            SPEEDUP=$(echo "scale=1; $UNCACHED / $CACHED" | bc)
            echo "| Cached build | ${CACHED}s |" >> "$GITHUB_STEP_SUMMARY"
            echo "| Speedup | ${SPEEDUP}x |" >> "$GITHUB_STEP_SUMMARY"
            echo "| ECR cache repo | ${ECR_CACHE_REPO} |" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"

            # Check if speedup >= 5x (compare integers to avoid bc issues)
            SPEEDUP_INT=$(echo "$UNCACHED / $CACHED" | bc)
            if [ "$SPEEDUP_INT" -ge 5 ]; then
              echo "Result: PASS (target: >5x improvement)" >> "$GITHUB_STEP_SUMMARY"
            else
              echo "Result: BELOW TARGET (target: >5x, got: ${SPEEDUP}x)" >> "$GITHUB_STEP_SUMMARY"
            fi
          else
            echo "| Cached build | N/A (ECR not configured) |" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "Result: SKIPPED (ECR_CACHE_REPO not set)" >> "$GITHUB_STEP_SUMMARY"
          fi
